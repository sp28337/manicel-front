name: CI/CD Frontend

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm run build

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: manicel

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "🚀 Starting frontend deployment..."

            cd ~/manicel/manicel-front || { echo "❌ Failed to change directory"; exit 1; }

            # Load NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # Use LTS Node
            nvm use 24
            node -v
            pnpm -v

            echo "📦 Pulling latest code..."
            git fetch origin main
            git checkout main
            git pull origin main

            echo "📥 Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "🏗️ Building frontend..."
            pnpm run build

            echo "🔄 Restarting service..."
            sudo systemctl daemon-reload
            sudo systemctl restart manicel-front.service

            echo "⏳ Waiting for service..."
            sleep 3

            if ! sudo systemctl is-active --quiet manicel-front.service; then
              echo "❌ manicel-front.service failed!"
              sudo journalctl -u manicel-front.service -n 50 --no-pager
              exit 1
            fi

            echo "🏥 Health check..."
            if ! curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "⚠️ manicel-front.service not responding yet (may still be warming up)"
            fi

            echo "✅ Frontend deployment successful!"
